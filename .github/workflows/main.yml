name: Build LegalDiary APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore project files
        run: |
          python3 << 'PYEOF'
          import os, base64
          files = {
            "README.md": "",
            "app/build.gradle.kts": "",
            "app/proguard-rules.pro": "",
            "app/src/main/AndroidManifest.xml": "",
            "app/src/main/java/com/legaldiary/app/LegalDiaryApp.kt": "",
            "app/src/main/java/com/legaldiary/app/MainActivity.kt": "",
            "app/src/main/java/com/legaldiary/app/data/dao/CaseDao.kt": "",
            "app/src/main/java/com/legaldiary/app/data/database/LegalDiaryDatabase.kt": "",
            "app/src/main/java/com/legaldiary/app/data/model/CaseEntry.kt": "",
            "app/src/main/java/com/legaldiary/app/notification/AlarmReceiver.kt": "",
            "app/src/main/java/com/legaldiary/app/notification/AlarmScheduler.kt": "",
            "app/src/main/java/com/legaldiary/app/notification/BootReceiver.kt": "",
