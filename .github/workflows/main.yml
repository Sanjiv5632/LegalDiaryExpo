            "app/src/main/java/com/legaldiary/app/notification/ReminderWorker.kt": "",
            "app/src/main/java/com/legaldiary/app/repository/CaseRepository.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/components/PermissionHandler.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/navigation/NavGraph.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/screens/CalendarScreen.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/screens/CasesListScreen.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/screens/DailyEntryScreen.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/screens/MonthlyViewScreen.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/theme/Theme.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/viewmodel/CalendarViewModel.kt": "",
            "app/src/main/java/com/legaldiary/app/ui/viewmodel/DailyEntryViewModel.kt": "",
            "app/src/main/java/com/legaldiary/app/utils/DateUtils.kt": "",
            "app/src/main/java/com/legaldiary/app/utils/PdfGenerator.kt": "",
            "app/src/main/res/drawable/ic_gavel.xml": "",
            "app/src/main/res/drawable/ic_launcher_background.xml": "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHNoYXBlIHhtbG5zOmFuZHJvaWQ9Imh0dHA6Ly9zY2hlbWFzLmFuZHJvaWQuY29tL2Fway9yZXMvYW5kcm9pZCI+CiAgICA8c29saWQgYW5kcm9pZDpjb2xvcj0iIzFBMjM3RSIvPgo8L3NoYXBlPgo=",
            "app/src/main/res/drawable/ic_launcher_foreground.xml": "",
            "app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml": "",
            "app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml": "",
            "app/src/main/res/values-night/themes.xml": "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHlsZSBuYW1lPSJUaGVtZS5MZWdhbERpYXJ5IiBwYXJlbnQ9ImFuZHJvaWQ6VGhlbWUuTWF0ZXJpYWwuTm9BY3Rpb25CYXIiIC8+CjwvcmVzb3VyY2VzPgo=",
            "app/src/main/res/values/strings.xml": "PHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPkxlZ2FsRGlhcnk8L3N0cmluZz4KPC9yZXNvdXJjZXM+Cg==",
            "app/src/main/res/values/themes.xml": "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHlsZSBuYW1lPSJUaGVtZS5MZWdhbERpYXJ5IiBwYXJlbnQ9ImFuZHJvaWQ6VGhlbWUuTWF0ZXJpYWwuTGlnaHQuTm9BY3Rpb25CYXIiIC8+CjwvcmVzb3VyY2VzPgo=",
            "app/src/main/res/xml/backup_rules.xml": "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPGZ1bGwtYmFja3VwLWNvbnRlbnQ+CiAgICA8IS0tIEluY2x1ZGUgUm9vbSBkYXRhYmFzZSBpbiBiYWNrdXBzIC0tPgogICAgPGluY2x1ZGUgZG9tYWluPSJkYXRhYmFzZSIgcGF0aD0ibGVnYWxfZGlhcnkuZGIiIC8+CjwvZnVsbC1iYWNrdXAtY29udGVudD4K",
            "app/src/main/res/xml/data_extraction_rules.xml": "",
            "app/src/main/res/xml/file_paths.xml": "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHBhdGhzPgogICAgPGNhY2hlLXBhdGggbmFtZT0iY2FjaGUiIHBhdGg9Ii4iIC8+CiAgICA8ZXh0ZXJuYWwtcGF0aCBuYW1lPSJleHRlcm5hbCIgcGF0aD0iLiIgLz4KPC9wYXRocz4K",
            "build.gradle.kts": "",
            "gradle.properties": "YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQpvcmcuZ3JhZGxlLmp2bWFyZ3M9LVhteDIwNDhtIC1EZmlsZS5lbmNvZGluZz1VVEYtOApvcmcuZ3JhZGxlLmNvbmZpZ3VyYXRpb24tY2FjaGU9ZmFsc2UKa290bGluLmNvZGUuc3R5bGU9b2ZmaWNpYWwK",
            "gradle/libs.versions.toml": "",
            "gradle/wrapper/gradle-wrapper.properties": "",
            "settings.gradle.kts": "",
          }
          
          for path, b64 in files.items():
              d = os.path.dirname(path)
              if d: os.makedirs(d, exist_ok=True)
              with open(path,'wb') as f: f.write(base64.b64decode(b64))
              print('OK:',path)
          PYEOF

      - name: Generate Gradle wrapper
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o g.zip
          unzip -q g.zip
          ./gradle-8.9/bin/gradle wrapper --gradle-version 8.9
          chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            grep -n "error:\|FAILED\|What went wrong" /tmp/build.log | head -40
            exit 1
          fi
          find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LegalDiary-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload error log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: /tmp/build.log
          retention-days: 7
